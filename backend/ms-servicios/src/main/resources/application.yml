server:
  port: 8083

spring:
  application:
    name: ms-servicios
  datasource:
    url: jdbc:mysql://${MYSQL_SERVICIOS_HOST:${MYSQL_HOST:localhost}}:${MYSQL_SERVICIOS_PORT:${MYSQL_PORT:3306}}/${MYSQL_SERVICIOS_DATABASE:servicios_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_SERVICIOS_USER:${MYSQL_USER:root}}
    password: ${MYSQL_SERVICIOS_PASSWORD:${MYSQL_PASSWORD:root}}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret-base64: ${JWT_SECRET_BASE64:MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql:3306/servicios_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ${MYSQL_ROOT_PASSWORD:root}

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: update
